<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBO-ICT School | Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="app-body overlay-gradient" data-page="quiz">

<div class="container my-5">
    <nav class="navbar navbar-expand-lg navbar-light bg-transparent mb-4">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="index.html">HBO-ICT School</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vakken.html">Vakken</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="specialisaties.html">Specialisaties</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="quiz.html">Quiz</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="card-round p-4 mb-5 fade-in-up">
        <h1 class="section-heading">Interactiequiz voor HBO-ICT</h1>
        <p class="section-subtitle mb-0">
            Beantwoord alle vragen en ontdek hoe goed jouw interesse bij HBO-ICT past.
        </p>
    </header>

    <section class="quiz-card p-4 rounded-4 shadow fade-in-up">
        <div class="d-flex justify-content-between align-items-center flex-column flex-md-row gap-3 mb-4">
            <div class="timer-container">
                <i class="bi bi-question-circle"></i>
                <span id="questionCounter">Vraag 1 / 30</span>
            </div>
            <div class="streak-container">
                <i class="bi bi-star-fill"></i>
                <span id="scoreIndicator">Score: 0</span>
            </div>
        </div>

        <div id="quizContent">
            <h2 id="questionText" class="question-text mb-4"></h2>
            <div id="optionsContainer" class="row g-3"></div>
        </div>

        <div class="quiz-progress mt-4">
            <div id="progressBar" class="progress-bar" role="progressbar" style="width: 0%;"></div>
        </div>

        <div class="mt-4 text-end">
            <button id="nextButton" class="btn btn-primary" disabled>Volgende vraag</button>
        </div>
    </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js" defer></script>
</body>
</html>
